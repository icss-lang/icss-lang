<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
	<defs>
		<!-- Left half clip path -->
		<clipPath id="left-half">
			<rect x="0" y="0" width="256" height="512" />
		</clipPath>
		<!-- Right half clip path -->
		<clipPath id="right-half">
			<rect x="256" y="0" width="256" height="512" />
		</clipPath>
	</defs>

	<!-- CSS3 Shield Background -->
	<path fill="#cc6699" d="M71.357 460.819L30.272 0h451.456l-41.129 460.746L255.724 512z"/>
	<path fill="#e093ba" d="M405.388 431.408l35.148-393.73H256v435.146z"/>

	<!-- Left Half (x < 256) -->
	<g clip-path="url(#left-half)" fill="none" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
		<!-- 'css' text (Left portion) -->
		<g stroke="#ebebeb">
			<!-- Letter 'c' -->
			<path d="M 202 104 A 65 65 0 1 0 202 196" />
			<!-- Letter 's' -->
			<path d="M 288 100 A 30 30 0 0 0 232 115 C 232 145 292 155 292 185 A 30 30 0 0 1 236 200" />
			<!-- Letter 's' -->
			<path d="M 378 100 A 30 30 0 0 0 322 115 C 322 145 382 155 382 185 A 30 30 0 0 1 326 200" />
		</g>
		<!-- Tab Symbol (Left portion) - Deep Matte Black -->
		<g stroke="#1a1a1a">
			<!-- Vertical Bar -->
			<path d="M 375 260 L 375 410" />
			<!-- Arrow Shaft and Head -->
			<path d="M 120 335 L 331 335" />
			<path d="M 281 285 L 331 335 L 281 385" />
		</g>
	</g>

	<!-- Right Half (x >= 256) -->
	<g clip-path="url(#right-half)" fill="none" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
		<!-- 'css' text (Right portion) -->
		<g stroke="#ffffff">
			<!-- Letter 'c' -->
			<path d="M 202 104 A 65 65 0 1 0 202 196" />
			<!-- Letter 's' -->
			<path d="M 288 100 A 30 30 0 0 0 232 115 C 232 145 292 155 292 185 A 30 30 0 0 1 236 200" />
			<!-- Letter 's' -->
			<path d="M 378 100 A 30 30 0 0 0 322 115 C 322 145 382 155 382 185 A 30 30 0 0 1 326 200" />
		</g>
		<!-- Tab Symbol (Right portion) - Charcoal Black -->
		<g stroke="#3b3b3b">
			<!-- Vertical Bar -->
			<path d="M 375 260 L 375 410" />
			<!-- Arrow Shaft and Head -->
			<path d="M 120 335 L 331 335" />
			<path d="M 281 285 L 331 335 L 281 385" />
		</g>
	</g>
</svg>
